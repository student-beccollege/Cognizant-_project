<div class="login-page">
  <div class="login-card">

    <h1 class="brand">AquaSense</h1>
    <h2>Sign in</h2>
    <p class="sub">Enter your credentials to continue</p>

    <p *ngIf="message" [ngClass]="{'error-msg': iserror, 'success-msg': !iserror}">{{ message }}</p>

    <form #LogRef="ngForm" (ngSubmit)="onsubmit(LogRef)">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" [(ngModel)]="logdata.username"
               required #userRef="ngModel" class="form-control" placeholder="Enter username" />
        <small *ngIf="userRef.invalid && userRef.touched">Username is required.</small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" [(ngModel)]="logdata.password"
               required #passRef="ngModel" class="form-control" placeholder="Enter password" />
        <small *ngIf="passRef.invalid && passRef.touched">Password is required.</small>
      </div>

      <button type="submit" [disabled]="LogRef.invalid" class="btn-signin">Sign in</button>
    </form>

    <p class="footer-link">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
